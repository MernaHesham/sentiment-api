name: Run Tests on PRs

on:
  pull_request:  # Runs on every PR to main
    branches:
      - main
  push:  # Runs on every push to main
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:  # ✅ Start a Redis container
        image: redis:latest
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest redis 
          
      - name: Wait for Redis to be ready
        run: |
          echo "Waiting for Redis..."
          for i in {1..10}; do
            if nc -z localhost 6379; then
              echo "✅ Redis is up!"
              exit 0
            fi
            echo "❌ Redis not ready. Retrying in 3s..."
            sleep 3
          done
          echo "🚨 Redis did not start in time!"
          exit 1
      - name: Run tests
        run: |
          pytest test_app.py --maxfail=5 --disable-warnings -v
